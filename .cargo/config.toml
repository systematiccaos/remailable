# Cross-compilation configuration for reMarkable Paper Pro
#
# This config is used when building for the reMarkable Paper Pro (codename: ferrari).
# It points to the Yocto SDK's cross-compiler and sysroot for the ARM64 target.
#
# IMPORTANT: The Paper Pro uses an AArch64 (ARM64) Cortex-A53 CPU with glibc.
# The correct Rust target is aarch64-unknown-linux-gnu.
#
# SDK Setup (Docker cross-compilation recommended on macOS):
# 1. Build the Docker image: docker build -t remailable-cross docker/
# 2. Run the cross-build inside the container (see scripts/docker-build.sh)
#
# For native macOS development builds, Qt is found via the system PATH
# (e.g. /opt/homebrew/bin/qmake via Homebrew). No special config needed.
#
# CI: GitHub Actions installs the SDK automatically (see .github/workflows/).

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-remarkable-linux-g++"

# Sysroot and library paths — these tell the linker where to find the Yocto SDK's
# Qt and system libraries for the ARM64 target.
# NOTE: These paths are valid INSIDE the Docker container where the SDK is mounted.
rustflags = [
  "-C", "link-arg=--sysroot=/opt/codex/rm-ferrari/sysroots/cortexa53-crypto-remarkable-linux",
  "-C", "link-arg=-L/opt/codex/rm-ferrari/sysroots/cortexa53-crypto-remarkable-linux/usr/lib",
  "-C", "link-arg=-L/opt/codex/rm-ferrari/sysroots/cortexa53-crypto-remarkable-linux/lib",
]

# Cross-compilation env vars — set by the SDK environment-setup script.
# For native macOS builds, Qt is found via /opt/homebrew/bin/qmake (Homebrew).
# DO NOT put QMAKE/PKG_CONFIG in the global [env] section — it breaks native builds.